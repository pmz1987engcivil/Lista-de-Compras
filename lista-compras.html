<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🛒 Lista de Compras</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --verde: #2ecc71; --verde-escuro: #27ae60;
    --fundo: #f0f4f0; --card: #ffffff;
    --texto: #1a2e1a; --subtexto: #6b8c6b;
    --risco: #a8d5a2; --perigo: #e74c3c;
    --sombra: 0 2px 12px rgba(46,204,113,0.10); --radius: 16px;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--fundo); color: var(--texto); min-height: 100vh; padding-bottom: 120px; }
  header { background: var(--verde); padding: 18px 20px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 10px rgba(46,204,113,0.3); }
  header h1 { font-size: 1.35rem; font-weight: 900; color: white; }
  header h1 span { font-size: 1.5rem; }
  .status { background: rgba(255,255,255,0.25); color: white; font-size: 0.78rem; font-weight: 800; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: white; }
  .input-area { padding: 16px; background: white; border-bottom: 2px solid var(--fundo); display: flex; gap: 10px; align-items: center; }
  .input-area input { flex: 1; border: 2px solid #e0ece0; border-radius: 12px; padding: 12px 16px; font-size: 1rem; font-family: 'Nunito', sans-serif; font-weight: 600; color: var(--texto); background: var(--fundo); outline: none; transition: border-color 0.2s; }
  .input-area input:focus { border-color: var(--verde); background: white; }
  .input-area input::placeholder { color: #aac8aa; font-weight: 600; }
  .btn-add { background: var(--verde); color: white; border: none; border-radius: 12px; width: 48px; height: 48px; font-size: 1.6rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s, background 0.15s; }
  .btn-add:active { transform: scale(0.92); background: var(--verde-escuro); }
  .progresso-wrap { padding: 12px 16px 4px; }
  .progresso-label { font-size: 0.78rem; font-weight: 700; color: var(--subtexto); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progresso-bar { background: #d6ead6; border-radius: 10px; height: 8px; overflow: hidden; }
  .progresso-fill { height: 100%; background: linear-gradient(90deg, var(--verde), var(--verde-escuro)); border-radius: 10px; transition: width 0.4s cubic-bezier(.4,2,.6,1); }
  .lista { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .item { background: var(--card); border-radius: var(--radius); display: flex; align-items: center; padding: 14px 14px 14px 10px; box-shadow: var(--sombra); border: 2px solid transparent; gap: 10px; }
  .item.comprado { background: #f5fbf5; border-color: #d6ead6; opacity: 0.75; }
  .checkbox { width: 28px; height: 28px; border-radius: 8px; border: 2.5px solid #c0dcc0; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 1rem; }
  .item.comprado .checkbox { background: var(--verde); border-color: var(--verde); color: white; }
  .item-nome { flex: 1; font-size: 1rem; font-weight: 700; color: var(--texto); word-break: break-word; line-height: 1.3; }
  .item.comprado .item-nome { text-decoration: line-through; color: var(--risco); font-weight: 600; }
  .qtd-ctrl { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .qtd-btn { width: 28px; height: 28px; border-radius: 8px; border: 2px solid #e0ece0; background: var(--fundo); font-size: 1.1rem; font-weight: 900; color: var(--subtexto); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .qtd-btn:active { background: var(--verde); color: white; border-color: var(--verde); }
  .qtd-num { font-size: 0.85rem; font-weight: 800; color: var(--subtexto); min-width: 18px; text-align: center; }
  .btn-del { width: 30px; height: 30px; border-radius: 8px; border: none; background: #fdecea; color: var(--perigo); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-del:active { background: var(--perigo); color: white; }
  .vazio { text-align: center; padding: 48px 20px; color: var(--subtexto); }
  .vazio .icone { font-size: 3.5rem; margin-bottom: 12px; }
  .vazio p { font-size: 1rem; font-weight: 700; }
  .vazio small { font-size: 0.85rem; font-weight: 600; opacity: 0.7; }
  .rodape { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 16px; border-top: 2px solid var(--fundo); display: flex; gap: 10px; }
  .btn-limpar, .btn-limpar-comprados { flex: 1; padding: 13px; border-radius: 12px; border: none; font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 800; cursor: pointer; }
  .btn-limpar-comprados { background: var(--fundo); color: var(--subtexto); border: 2px solid #d6ead6; }
  .btn-limpar { background: #fdecea; color: var(--perigo); border: 2px solid #f5c6c2; }
  .btn-limpar:active { background: var(--perigo); color: white; }
  .secao-titulo { padding: 6px 16px 0; font-size: 0.75rem; font-weight: 800; color: var(--subtexto); text-transform: uppercase; letter-spacing: 1px; }
  .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--texto); color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.88rem; font-weight: 700; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .carregando { text-align: center; padding: 40px; color: var(--subtexto); font-weight: 700; }
</style>
</head>
<body>

<header>
  <h1><span>🛒</span> Lista de Compras</h1>
  <div class="status"><div class="status-dot" id="statusDot"></div><span id="statusTxt">conectando...</span></div>
</header>

<div class="input-area">
  <input type="text" id="inputItem" placeholder="Adicionar item..." autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="btn-add" id="btnAdd">+</button>
</div>

<div class="progresso-wrap" id="progressoWrap" style="display:none">
  <div class="progresso-label"><span>Progresso</span><span id="progressoTexto">0 / 0</span></div>
  <div class="progresso-bar"><div class="progresso-fill" id="progressoFill" style="width:0%"></div></div>
</div>

<div id="app"><div class="carregando">⏳ Conectando...</div></div>

<div class="rodape">
  <button class="btn-limpar-comprados" id="btnRemoverComprados">✅ Remover comprados</button>
  <button class="btn-limpar" id="btnLimparTudo">🗑 Limpar tudo</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBG2bZYTBLcphUb1X0lYhJQJ8tLdMOJcwQ",
    authDomain: "lista-compras-d629a.firebaseapp.com",
    databaseURL: "https://lista-compras-d629a-default-rtdb.firebaseio.com",
    projectId: "lista-compras-d629a",
    storageBucket: "lista-compras-d629a.firebasestorage.app",
    messagingSenderId: "814279729568",
    appId: "1:814279729568:web:f68ffa035819159d21c4c5"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const listaRef = db.ref('lista');

  // Status conexão
  db.ref('.info/connected').on('value', snap => {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusTxt');
    if (snap.val()) {
      dot.style.background = 'white';
      txt.textContent = 'ao vivo';
    } else {
      dot.style.background = '#f39c12';
      txt.textContent = 'sem conexão';
    }
  });

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // Adicionar item
  function adicionarItem() {
    const input = document.getElementById('inputItem');
    const nome = input.value.trim();
    if (!nome) return;
    listaRef.push({ nome: nome, qtd: 1, comprado: false, ts: Date.now() });
    input.value = '';
    input.focus();
    toast('Item adicionado!');
  }

  document.getElementById('btnAdd').addEventListener('click', adicionarItem);
  document.getElementById('inputItem').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') adicionarItem();
  });

  // Escuta mudanças em tempo real
  listaRef.on('value', function(snap) {
    var appDiv = document.getElementById('app');
    var pw = document.getElementById('progressoWrap');

    if (!snap.exists()) {
      pw.style.display = 'none';
      appDiv.innerHTML = '<div class="vazio"><div class="icone">🛍️</div><p>Lista vazia</p><small>Adicione itens acima</small></div>';
      return;
    }

    var itens = [];
    snap.forEach(function(child) {
      var val = child.val();
      itens.push({
        id: child.key,
        nome: val.nome || '',
        qtd: val.qtd || 1,
        comprado: val.comprado || false,
        ts: val.ts || 0
      });
    });

    itens.sort(function(a, b) { return a.ts - b.ts; });

    var pendentes = itens.filter(function(i) { return !i.comprado; });
    var comprados = itens.filter(function(i) { return i.comprado; });
    var total = itens.length;
    var totalComprados = comprados.length;

    pw.style.display = 'block';
    document.getElementById('progressoTexto').textContent = totalComprados + ' / ' + total;
    document.getElementById('progressoFill').style.width = Math.round(totalComprados / total * 100) + '%';

    var html = '';

    if (pendentes.length > 0) {
      html += '<div class="secao-titulo">A comprar (' + pendentes.length + ')</div><div class="lista">';
      pendentes.forEach(function(item) { html += renderItem(item); });
      html += '</div>';
    }

    if (comprados.length > 0) {
      html += '<div class="secao-titulo" style="margin-top:8px">Já comprado (' + comprados.length + ')</div><div class="lista">';
      comprados.forEach(function(item) { html += renderItem(item); });
      html += '</div>';
    }

    appDiv.innerHTML = html;
  });

  function renderItem(item) {
    var check = item.comprado ? '✓' : '';
    var compradoClass = item.comprado ? ' comprado' : '';
    return '<div class="item' + compradoClass + '">' +
      '<div class="checkbox" onclick="toggleItem(\'' + item.id + '\', ' + item.comprado + ')">' + check + '</div>' +
      '<div class="item-nome">' + escapeHtml(item.nome) + '</div>' +
      '<div class="qtd-ctrl">' +
        '<button class="qtd-btn" onclick="alterarQtd(\'' + item.id + '\', -1, ' + item.qtd + ')">−</button>' +
        '<span class="qtd-num">' + item.qtd + 'x</span>' +
        '<button class="qtd-btn" onclick="alterarQtd(\'' + item.id + '\', 1, ' + item.qtd + ')">+</button>' +
      '</div>' +
      '<button class="btn-del" onclick="removerItem(\'' + item.id + '\')">✕</button>' +
    '</div>';
  }

  function toggleItem(id, comprado) {
    db.ref('lista/' + id).update({ comprado: !comprado });
  }

  function removerItem(id) {
    db.ref('lista/' + id).remove();
  }

  function alterarQtd(id, delta, qtdAtual) {
    var nova = Math.max(1, qtdAtual + delta);
    db.ref('lista/' + id).update({ qtd: nova });
  }

  document.getElementById('btnRemoverComprados').addEventListener('click', function() {
    listaRef.once('value', function(snap) {
      if (!snap.exists()) { toast('Nenhum item comprado'); return; }
      var count = 0;
      snap.forEach(function(child) {
        if (child.val().comprado) {
          db.ref('lista/' + child.key).remove();
          count++;
        }
      });
      if (count === 0) toast('Nenhum item comprado ainda');
      else toast(count + ' item(ns) removido(s)');
    });
  });

  document.getElementById('btnLimparTudo').addEventListener('click', function() {
    listaRef.once('value', function(snap) {
      if (!snap.exists()) { toast('A lista já está vazia'); return; }
      if (!confirm('Limpar toda a lista?')) return;
      listaRef.remove();
      toast('Lista limpa!');
    });
  });
</script>
</body>
</html>
